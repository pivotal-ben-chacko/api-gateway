version: '3.8'

services:
  nginx-gateway:
    build: .
    container_name: vcenter-api-gateway
    ports:
      - "443:443"
      - "80:80"
    volumes:
      # Mount configuration files for easy updates
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro

      # Mount SSL certificates (create these before starting)
      # For production, mount your actual certificates here
      - ./ssl:/etc/nginx/ssl:ro

      # Mount log directory for persistent logs
      - ./logs:/var/log/nginx
    environment:
      # Optional: Set environment variables if needed
      - TZ=UTC
    restart: unless-stopped
    networks:
      - vcenter-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost/nginx-health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  vcenter-network:
    driver: bridge
