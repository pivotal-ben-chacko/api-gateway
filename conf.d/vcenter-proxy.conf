# vCenter Proxy Configuration
# Proxies Bosh Director CPI calls to vCenter API

# Upstream vCenter server(s)
upstream vcenter_backend {
    # Replace with your actual vCenter hostname/IP
    # Example: server vcenter.example.com:443;
    server VCENTER_HOST:443 max_fails=3 fail_timeout=30s;

    # Enable keepalive connections to vCenter
    keepalive 32;
    keepalive_timeout 60s;
}

# HTTPS server - API Gateway endpoint
server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificate for the gateway (client-facing)
    # These certificates are for the connection FROM Bosh TO NGINX
    ssl_certificate /etc/nginx/ssl/gateway.crt;
    ssl_certificate_key /etc/nginx/ssl/gateway.key;

    # Optional: Client certificate verification (if Bosh uses mutual TLS)
    # ssl_client_certificate /etc/nginx/ssl/ca.crt;
    # ssl_verify_client optional;

    # Enhanced SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384';
    ssl_prefer_server_ciphers on;

    # Enable detailed logging for debugging
    access_log /var/log/nginx/vcenter-access.log vcenter_api;
    error_log /var/log/nginx/vcenter-error.log debug;

    # Proxy all requests to vCenter
    location / {
        # Proxy to vCenter backend with SSL
        proxy_pass https://vcenter_backend;

        # Preserve original request information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important: Pass through authentication headers
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;

        # vCenter-specific headers
        proxy_set_header Accept "application/json, text/plain, */*";
        proxy_set_header Content-Type $content_type;

        # SSL verification for backend vCenter connection
        # For production, set to 'on' and provide the vCenter CA certificate
        proxy_ssl_verify off;
        # proxy_ssl_verify on;
        # proxy_ssl_trusted_certificate /etc/nginx/ssl/vcenter-ca.crt;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # Keepalive settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeout settings for long-running vCenter operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffer settings for large API responses
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Disable proxy redirect rewriting (preserve vCenter redirects)
        proxy_redirect off;

        # Enable request/response body logging for debugging (disable in production)
        # client_body_in_file_only clean;
        # client_body_buffer_size 1M;
    }

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Specific vCenter API endpoints (optional - for additional logging/routing)
    location ~ ^/sdk {
        # vCenter SOAP API endpoint
        proxy_pass https://vcenter_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Extended timeouts for SOAP operations
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ~ ^/rest {
        # vCenter REST API endpoint
        proxy_pass https://vcenter_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location ~ ^/api {
        # vCenter vAPI endpoint
        proxy_pass https://vcenter_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# Optional: HTTP to HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
