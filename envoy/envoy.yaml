# Envoy proxy configuration — functional parity with the NGINX API gateway.
# Proxies Bosh Director CPI calls through to vCenter over TLS, with detailed
# access logging, per-path timeouts for SOAP/REST/vAPI endpoints, a health
# check endpoint, and HTTP → HTTPS redirect.
#
# Replace VCENTER_HOST below with your vCenter hostname/IP, or render this
# file through envsubst at startup (see envoy/README.md).

admin:
  address:
    socket_address: { address: 127.0.0.1, port_value: 9901 }

static_resources:

  listeners:
    # ---- HTTPS listener: terminates TLS from Bosh, proxies to vCenter ----
    - name: https_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 443 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_2
                  tls_maximum_protocol_version: TLSv1_3
                  cipher_suites:
                    - ECDHE-ECDSA-AES128-GCM-SHA256
                    - ECDHE-RSA-AES128-GCM-SHA256
                    - ECDHE-ECDSA-AES256-GCM-SHA384
                    - ECDHE-RSA-AES256-GCM-SHA384
                tls_certificates:
                  - certificate_chain: { filename: /etc/envoy/ssl/tls.crt }
                    private_key: { filename: /etc/envoy/ssl/tls.key }
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                codec_type: AUTO
                http2_protocol_options: {}
                use_remote_address: true
                common_http_protocol_options:
                  idle_timeout: 65s
                request_headers_timeout: 60s

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format_source:
                          inline_string: |
                            %DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT% - %REQ(:AUTHORITY)% [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%" %RESPONSE_CODE% %BYTES_SENT% "%REQ(REFERER)%" "%REQ(USER-AGENT)%" rt=%DURATION%ms uct=%UPSTREAM_CONNECTION_ID% uht=%RESPONSE_DURATION%ms urt=%RESPONSE_TX_DURATION%ms upstream=%UPSTREAM_HOST%

                route_config:
                  name: vcenter_route
                  virtual_hosts:
                    - name: vcenter_vhost
                      domains: ["*"]
                      routes:
                        # Health check — returns 200 "healthy" locally
                        - match: { path: /nginx-health }
                          direct_response:
                            status: 200
                            body:
                              inline_string: "healthy\n"

                        # vCenter SOAP API — extended timeouts (matches nginx)
                        - match: { prefix: /sdk }
                          route:
                            cluster: vcenter_backend
                            timeout: 600s
                            idle_timeout: 600s

                        # vCenter REST API
                        - match: { prefix: /rest }
                          route:
                            cluster: vcenter_backend
                            timeout: 300s

                        # vCenter vAPI
                        - match: { prefix: /api }
                          route:
                            cluster: vcenter_backend
                            timeout: 300s

                        # Catch-all — everything else goes to vCenter
                        - match: { prefix: / }
                          route:
                            cluster: vcenter_backend
                            timeout: 300s

                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ---- HTTP listener: permanent redirect to HTTPS ----
    - name: http_redirect_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 80 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http_redirect
                codec_type: AUTO
                route_config:
                  name: redirect_all
                  virtual_hosts:
                    - name: redirect_vhost
                      domains: ["*"]
                      routes:
                        - match: { prefix: / }
                          redirect:
                            https_redirect: true
                            response_code: MOVED_PERMANENTLY
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ---- Upstream vCenter cluster ----
    - name: vcenter_backend
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 60s
      dns_lookup_family: V4_ONLY
      load_assignment:
        cluster_name: vcenter_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: VCENTER_HOST
                      port_value: 443

      # HTTP/1.1 with keepalive to the upstream (matches nginx keepalive 32)
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http_protocol_options: {}
          common_http_protocol_options:
            idle_timeout: 60s

      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 32
            max_pending_requests: 1024
            max_requests: 1024
            max_retries: 3

      # TLS to vCenter. Verification disabled (matches proxy_ssl_verify off).
      # For production, add a validation_context with vCenter's CA.
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: VCENTER_HOST
          common_tls_context:
            tls_params:
              tls_minimum_protocol_version: TLSv1_2
              tls_maximum_protocol_version: TLSv1_3
